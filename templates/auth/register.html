{% extends 'base.html' %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
  <div class="w-full max-w-md">

    <div class="text-center mb-8">
      <h1 class="font-display text-3xl font-bold text-slate-900">Create account</h1>
      <p class="text-slate-500 mt-1">Join ATS Lite as a recruiter</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
      <form method="post" action="{% url 'register' %}">
        {% csrf_token %}
        <div class="space-y-4">
          {% for field in form %}
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">{{ field.label }}</label>
            <input type="{{ field.field.widget.input_type }}" name="{{ field.html_name }}"
              id="{{ field.id_for_label }}"
              class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm
                {% if field.errors %}border-red-400{% endif %}"
              {% if field.value %}value="{{ field.value }}"{% endif %} />
            {% for error in field.errors %}
              <p class="text-xs text-red-500 mt-1">{{ error }}</p>
            {% endfor %}
          </div>
          {% endfor %}

          <button type="submit"
            class="w-full py-2.5 rounded-xl bg-indigo-600 text-white font-semibold text-sm hover:bg-indigo-700 transition mt-2">
            Create Account
          </button>
        </div>
      </form>

      <p class="text-center text-sm text-slate-500 mt-6">
        Already have an account?
        <a href="{% url 'login' %}" class="text-indigo-600 font-medium hover:underline">Sign in</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
