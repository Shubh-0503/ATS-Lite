<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}ATS Lite{% endblock %} — ATS Lite</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Fraunces:wght@700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'DM Sans', sans-serif; }
    .font-display { font-family: 'Fraunces', serif; }
    .nav-link { @apply text-slate-600 hover:text-indigo-600 transition-colors font-medium text-sm; }
    .badge-score { border-radius: 99px; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

  <!-- Navigation -->
  <nav class="bg-white border-b border-slate-200 sticky top-0 z-40">
    <div class="max-w-6xl mx-auto px-4 sm:px-6">
      <div class="flex items-center justify-between h-16">
        <!-- Logo -->
        <a href="{% url 'job_list' %}" class="flex items-center gap-2">
          <span class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center">
            <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2-2v2m8 0H8m8 0a2 2 0 012 2v6a2 2 0 01-2 2H8a2 2 0 01-2-2V8a2 2 0 012-2"/>
            </svg>
          </span>
          <span class="font-display font-bold text-slate-900 text-lg">ATS Lite</span>
        </a>

        <!-- Nav Links -->
        <div class="flex items-center gap-6">
          <a href="{% url 'job_list' %}" class="nav-link">Jobs</a>
          {% if user.is_authenticated %}
            <a href="{% url 'job_create' %}" class="nav-link">Post Job</a>
            <a href="{% url 'notification_list' %}" class="nav-link relative">
              Notifications
              <!-- Unread badge - shown dynamically via template tag or context -->
            </a>
            <div class="flex items-center gap-3 ml-2">
              <span class="text-sm text-slate-500">{{ user.username }}</span>
              <form method="post" action="{% url 'logout' %}">
                {% csrf_token %}
                <button type="submit"
                  class="text-sm px-3 py-1.5 rounded-lg border border-slate-200 text-slate-600 hover:bg-slate-50 transition">
                  Logout
                </button>
              </form>
            </div>
          {% else %}
            <a href="{% url 'login' %}"
              class="text-sm px-4 py-2 rounded-lg bg-indigo-600 text-white hover:bg-indigo-700 transition font-medium">
              Login
            </a>
          {% endif %}
        </div>
      </div>
    </div>
  </nav>

  <!-- Flash Messages -->
  {% if messages %}
  <div class="max-w-6xl mx-auto px-4 sm:px-6 mt-4 space-y-2">
    {% for msg in messages %}
    <div class="flex items-center gap-3 p-4 rounded-xl
      {% if msg.tags == 'success' %}bg-emerald-50 border border-emerald-200 text-emerald-800
      {% elif msg.tags == 'error' %}bg-red-50 border border-red-200 text-red-800
      {% elif msg.tags == 'warning' %}bg-amber-50 border border-amber-200 text-amber-800
      {% else %}bg-blue-50 border border-blue-200 text-blue-800{% endif %}">
      <span class="text-sm font-medium">{{ msg }}</span>
    </div>
    {% endfor %}
  </div>
  {% endif %}

  <!-- Main Content -->
  <main class="flex-1 max-w-6xl mx-auto w-full px-4 sm:px-6 py-8">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="border-t border-slate-200 bg-white mt-8">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 py-4">
      <p class="text-sm text-slate-400 text-center">ATS Lite — Internship Assignment Project</p>
    </div>
  </footer>

</body>
</html>
